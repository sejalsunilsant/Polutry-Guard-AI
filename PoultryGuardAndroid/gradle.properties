# Project-wide Gradle settings.
# For more details on how to configure your build by writing properties files,
# visit http://www.gradle.org/docs/current/userguide/build_environment.html

# Enable AndroidX and auto-conversion of third-party libraries
android.useAndroidX=true
android.nonTransitiveRClass=true

# JVM parameters for the build process
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8

# Enable parallel and caching build optimization
org.gradle.parallel=true
org.gradle.caching=true

# Kotlin flags
kotlin.code.style=official
